<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support contact</title>
    <link rel="stylesheet" href="contato.css">
</head>

<body>

    <div class="contato-suporte">
        <form action="https://formsubmit.co/jeffinpvp.games@gmail.com" method="POST">
            <h2 data-key="titulo-contato">Support Contact</h2>

            <input type="hidden" name="_subject" value="Novo conntato de suporte">
            <input type="hidden" name="_captcha" value="false">

            <label data-key="label-name">Name</label>
            <input type="text" name="Nome" placeholder="Your full name" required>
            <br>
            <br>
            <label data-key="label-email">Email</label>
            <input type="email" name="Email" placeholder="Your email" required>
            <br>
            <br>
            <label data-key="label-subject">Subject</label>
            <input type="text" name="Assunto" placeholder="Subject of the message" required>
            <br>
            <br>
            <label data-key="label-message">Message</label>
            <textarea name="Mensagem" placeholder="Describe your question or problem" required></textarea>

            <button type="submit" data-key="btn-enviar">Send Message</button>
            <br>
            <a href="index.html" class="btn" data-key="btn-voltar">Return to main menu</a>   
        </form>
    </div>

</body>

</html>
