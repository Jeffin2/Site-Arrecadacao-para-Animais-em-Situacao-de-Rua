<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support contact</title>
    <link rel="stylesheet" href="contato.css">
</head>

<body>

    <div class="contato-suporte">
        <form action="https://formsubmit.co/jeffinpvp.games@gmail.com" method="POST">
            <h2>🚨 Suporte 🚨</h2>

            <input type="hidden" name="_subject" value="🚨 Nova denúncia no chat">
            <input type="hidden" name="_captcha" value="false">

            <label>Seu nome</label>
            <input type="text" name="nome-denunciante" placeholder="Seu nome completo" required>

            <label>Seu apelido</label>
            <input type="text" name="apelido-denunciante" placeholder="Seu apelido" required>

            <label>Seu email</label>
            <input type="email" name="email-denunciante" placeholder="Seu email" required>

            <label>Usuário denunciado</label>
            <input type="text" name="denunciado" placeholder="Nome do usuário denunciado" required>

            <label>Sala</label>
            <input type="text" name="sala" placeholder="Nome da sala" required>

            <label>Data e hora do ocorrido</label>
            <input type="datetime-local" name="data-e-hora" placeholder="Data e hora do ocorrido" required>

            <label>Motivo</label>
            <select name="motivo" required>
                <option value="">Selecione</option>
                <option value="Ofensa">Ofensa</option>
                <option value="*****édio">A-s-s-é-d-i-o</option>
                <option value="Spam">Spam</option>
                <option value="Conteúdo impróprio">Conteúdo impróprio</option>
                <option value="Outro">Outro</option>
            </select>

            <label>Mensagem (opcional)</label>
            <textarea name="mensagem" placeholder="Deixe sua mensagem adicional"></textarea>
            <h4>Sua denúncia terá um prazo de no máximo 7 dias úteis para ser respondido!</h4>
            <h4>Fique atento! Você pode ser notificado por email para ser colhido seu depoimento!</h4>
            <h4>Lembre-se! Fazer uma denúncia é algo sério!</h4>
            <h4>Nunca faça uma denúncia falsa!</h4>
            <button type="submit">Enviar denúncia</button>
        </form>
    </div>

</body>

</html>
